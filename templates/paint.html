<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mode Paint - Puissance 4</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="game-container">

    <h1>Mode Paint</h1>
    <p id="status">Choisissez Rouge, Jaune ou Effacer puis dessinez le plateau</p>
    <p id="prediction">Prédiction : -</p>
    <p id="forcedprediction">Analyse complète : -</p>
    <p id="bestmove">Meilleur coup conseillé : -</p>
   

    <canvas id="board" width="450" height="570"></canvas>

    <div class="buttons">
        <button id="paint-red" onclick="setPaintValue('R')">🔴 Rouge</button>
        <button id="paint-yellow" onclick="setPaintValue('Y')">🟡 Jaune</button>
        <button id="paint-empty" onclick="setPaintValue('.')">⬜ Effacer</button>

        <button onclick="triggerPaintImport()">📂 Importer fichier</button>
        <input type="file" id="paint-file-input" accept=".txt,.json" style="display:none" onchange="importPaintFile(event)">
    
        <button onclick="paintAIMove()">🤖 IA joue</button>
        <button onclick="undoPaint()">↩ Undo</button>
        <button onclick="paintAIAuto()">🔁 IA vs IA</button>
        <button onclick="stopAutoPaint()">⏹ Stop</button>
        <button onclick="setPaintDepth()">Profondeur</button>
        
        <button onclick="restartPaint()">Restart</button>
        <button onclick="savePaintGame()">💾 Save</button>
        <button onclick="goMenu()">🏠 Menu</button>
    </div>

</div>

<script>
    window.game_id = {{ game_id | tojson }};
    window.page_mode = "paint";
    window.paint_initial_board = {{ board | tojson }};
</script>
<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
